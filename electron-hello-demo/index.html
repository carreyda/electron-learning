<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Electron 实战入门</title>
    <style>
        body {
            text-align: center;
            margin-top: 200px;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <h1>✅ Hello Electron！桌面应用启动成功</h1>
    <p>当前系统平台：<span id="platform"></span></p>
    <button onclick="pickFile()">📂 选择文件</button>
    <p>选中文件：<span id="filePath"></span></p>
    <script>
        // 获取预加载暴露的全局变量
        document.getElementById('platform').innerText = window.electronEnv.platform

        // 发送消息到主进程
        window.ipc.send('render-to-main', 'Hello 主进程！')

        // 监听主进程回复
        window.ipc.on('main-to-render', (event, data) => {
            alert(data)
        })

        // 打开文件选择对话框
        async function pickFile() {
            const files = await window.ipc.invoke('open-file-dialog')
            if (files && files.length > 0) {
                document.getElementById('filePath').innerText = files[0]
            }
        }
    </script>
</body>

</html>
