<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Electron 实战入门</title>
    <style>
        body {
            text-align: center;
            margin-top: 200px;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <h1>✅ Hello Electron！桌面应用启动成功</h1>
    <p>当前系统平台：<span id="platform"></span></p>
    <script>
        // 获取预加载暴露的全局变量
        document.getElementById('platform').innerText = window.electronEnv.platform
    </script>
</body>

</html>
